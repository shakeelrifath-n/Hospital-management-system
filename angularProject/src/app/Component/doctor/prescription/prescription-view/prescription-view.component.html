<div *ngIf="prescription">
    <h2>Prescription Details</h2>
    <div>
      <h4>Prescription ID: {{ prescription.id }}</h4>
      <h4>Medicines:</h4>
      <p>{{ getMedicineText() || 'None' }}</p>
      <h4>Tests:</h4>
      <p>{{ getTestText() || 'None' }}</p>
      <h4>Notes:</h4>
      <p>{{ prescription.notes }}</p>
    </div>
  </div>
  <div *ngIf="!prescription">
    <p>Loading prescription details...</p>
  </div>
