<div class="main-wrapper account-wrapper bg-white">
  <div class="account-page">
    <div class="account-center">
      <div class="account-box">
        <div class="text-center mb-4">
          <h2 class="mb-2">Reset Password</h2>
          <p class="text-muted mb-0">
            This POC includes a simple password reset landing page.
          </p>
        </div>

        <div class="alert alert-info">
          Password reset is not wired to the backend yet. For now, please contact an administrator or return to login.
        </div>

        <div class="text-center">
          <button type="button" class="btn btn-primary account-btn" (click)="goBack()">Back to Login</button>
        </div>
      </div>
    </div>
  </div>
</div>
